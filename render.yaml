services:
  - type: web
    name: pinghr-api
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: LLM_PROVIDER
        value: openai_compatible
      - key: LLM_API_KEY
        sync: false
      - key: LLM_BASE_URL
        sync: false
      - key: LLM_MODEL
        value: databricks-qwen3-next-80b-a3b-instruct
      - key: ALLOWED_TEST_USER_EMAILS
        value: ""
      - key: LANGFUSE_ENABLED
        value: "false"
  - type: web
    runtime: static
    name: pinghr-ui
    rootDir: apps/web-ts
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: false
    autoDeploy: true
    envVars:
      - key: VITE_API_BASE_URL
        value: https://pinghr-api.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
